# YAMIL Browser Chat Service - Standalone Docker Compose
# Default: Ollama (local) with optional cloud providers via .env
services:
  chat:
    build: .
    ports:
      - "${PORT:-8020}:${PORT:-8020}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: ${PORT:-8020}
      SERVICE_NAME: yamil-browser-chat
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-yamil}:${DB_PASSWORD:-yamil}@postgres:5432/${DB_NAME:-yamil_chat}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      # LLM routing
      LLM_PREFER_LOCAL: ${LLM_PREFER_LOCAL:-true}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-ollama,gemini,openai,anthropic}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-auto}
      # Cloud provider keys (optional - add to .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai/v1}
      # Skip JWT for local desktop use
      SKIP_AUTH: "true"
      USE_SECRETS_MANAGER: "false"
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chat-net

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${DB_NAME:-yamil_chat}
      POSTGRES_USER: ${DB_USER:-yamil}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yamil}
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yamil}"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - chat-net

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - chat-net

volumes:
  postgres-data:
  redis-data:

networks:
  chat-net:
    driver: bridge
