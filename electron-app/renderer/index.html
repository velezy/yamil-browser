<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAMIL Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ── Tab bar ───────────────────────────────────────────────── -->
    <div id="tab-bar">
      <div id="tabs-list"></div>
      <button id="btn-new-tab" title="New Tab">&#43;</button>
    </div>

    <!-- ── Navigation bar ─────────────────────────────────────── -->
    <div id="navbar">
      <div id="nav-logo" title="YAMIL Browser">
        <img src="../assets/yamil-logo.png" alt="YAMIL" id="logo-img">
        <span id="logo-text">YAMIL</span>
      </div>
      <button id="btn-back"    title="Back">&#8592;</button>
      <button id="btn-forward" title="Forward">&#8594;</button>
      <button id="btn-refresh" title="Refresh">&#8635;</button>
      <div id="address-wrap">
        <span id="lock-icon">🔒</span>
        <input id="address-bar" type="text" placeholder="Enter URL..." autocomplete="off" spellcheck="false">
      </div>
      <div id="nav-right">
        <button id="btn-sidebar-open" title="Open AI sidebar" style="display:none">&#x276F;</button>
        <span id="conn-dot" class="dot connected" title="Ready"></span>
      </div>
    </div>

    <!-- ── Main area ──────────────────────────────────────────── -->
    <div id="main">

      <!-- Webviews are created dynamically by renderer.js -->
      <div id="webview-container"></div>

      <!-- AI Sidebar -->
      <div id="sidebar">
        <div id="sidebar-header">
          <span id="sidebar-title">
            <img src="../assets/yamil-logo.png" alt="" class="sidebar-logo">
            YAMIL AI
          </span>
          <button id="btn-sidebar-toggle" title="Collapse">&#x276E;</button>
        </div>

        <div id="chat-log"></div>

        <div id="chat-footer">
          <textarea id="chat-input" rows="2" placeholder="Ask AI to browse, extract, or automate..."></textarea>
          <button id="chat-send">&#9658;</button>
        </div>
      </div>

    </div>

    <!-- ── Status bar ─────────────────────────────────────────── -->
    <div id="statusbar">
      <span id="status-url"></span>
      <span id="status-loading"></span>
    </div>

  </div>
  <script src="renderer.js"></script>
</body>
</html>
